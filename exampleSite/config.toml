# 你的导航网站最终在线访问的完整网址（部署好后可以改成你在 CF 绑定的域名）
baseURL = "http://nav.stze.cn/"

# 网站的语言设置，zh-CN 代表简体中文
languageCode = "zh-CN"

# 浏览器的标签页标题，以及网站顶部的名字
title = "小泽导航页"

# 当前使用的主题名称（就是我们刚才强行指向的 webstack-hugo）
theme = "webstack-hugo"

# 保持分类名称的原样输出（防止 Hugo 自动把中文分类名转换为拼音或英文字母）
preserveTaxonomyNames = true

# 禁用路径自动转小写（防止网址路径中的大写字母被强行变成小写导致找不到页面）
disablePathToLower = true

# 开启中日韩（CJK）语言支持，优化中文环境下字数统计和搜索的准确性
hasCJKLanguage = true

# 网站底部的版权声明文字（留空则不显示，你可以写如 "© 2026 Mxiaoze"）
copyright = ""

[params]
  # 网站作者的名字
  author = "bypass:小泽"

  # 网站的描述信息（主要用于 SEO 搜索引擎优化，告诉百度/Google 这是一个什么网站）
  description = "小泽导航页"

[params.search]
  # 顶部搜索框的总开关！要关闭搜索框，请把下面的 true 改为 false ❌
  enable = false

[params.darkmode]
  # 夜间模式/暗黑模式的总开关（true 为开启，false 为关闭）
  enable = true